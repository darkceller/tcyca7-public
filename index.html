          {/* === Modal: 我要提案視窗 === */}
          {showSubmitModal && (
            <div className="fixed inset-0 z-50 flex items-center justify-center p-4 bg-slate-950/80 backdrop-blur-sm animate-in fade-in">
              <div className="bg-slate-900 border border-slate-700 rounded-2xl w-full max-w-2xl shadow-2xl overflow-hidden relative flex flex-col max-h-[90vh]">
                
                <div className="flex items-center justify-between p-5 border-b border-slate-800 bg-slate-900/50 shrink-0">
                  <h3 className="text-lg font-bold text-white flex items-center gap-2">
                    <Rocket size={18} className="text-emerald-500" />
                    發起新提案
                  </h3>
                  <button 
                    onClick={() => setShowSubmitModal(false)}
                    className="text-slate-400 hover:text-white transition-colors p-1 rounded-full hover:bg-slate-800"
                  >
                    <X size={20} />
                  </button>
                </div>

                <div className="overflow-y-auto overflow-x-hidden p-6 custom-scrollbar">
                  {submitFormStatus === 'success' ? (
                    <div className="py-16 text-center flex flex-col items-center justify-center animate-in zoom-in-95 duration-300">
                      <div className="w-20 h-20 bg-emerald-500/20 rounded-full flex items-center justify-center mb-6">
                        <CheckCircle2 size={40} className="text-emerald-500" />
                      </div>
                      <h4 className="text-2xl font-bold text-white mb-3">申請已送出！</h4>
                      <p className="text-slate-400 text-sm max-w-md mx-auto leading-relaxed">
                        我們已經收到您的提案構想。經過青年諮詢委員會檢視格式無誤後，即可正式在「提案大廳」刊登，開始您的 30 天連署挑戰。
                      </p>
                      <button 
                        onClick={() => setShowSubmitModal(false)}
                        className="mt-8 px-6 py-2.5 bg-slate-800 hover:bg-slate-700 text-white rounded-lg transition-colors border border-slate-700 font-bold text-sm"
                      >
                        返回平台
                      </button>
                    </div>
                  ) : (
                    <div className="space-y-6">
                      <div className="bg-emerald-900/20 border border-emerald-500/30 p-4 rounded-xl flex items-start gap-3">
                        <Lightbulb size={20} className="text-emerald-400 shrink-0 mt-0.5" />
                        <div className="text-sm text-slate-300 leading-relaxed">
                          請填寫下方表單以建立初步提案草案。送出後將由委員會進行審核，以確保符合平台規範。刊登後您將有 30 天的時間爭取附議。
                        </div>
                      </div>

                      <div className="space-y-5">
                        <div>
                          <label className="block text-sm font-bold text-slate-200 mb-2">提案名稱 <span className="text-rose-500">*</span></label>
                          <input type="text" placeholder="例如：桃園市公有閒置空間活化計畫" className="w-full bg-slate-950 border border-slate-700 rounded-lg p-3 text-sm text-slate-200 focus:outline-none focus:border-emerald-500 focus:ring-1 focus:ring-emerald-500 transition-all placeholder:text-slate-600" />
                        </div>
                        <div>
                          <label className="block text-sm font-bold text-slate-200 mb-2">對應之 SDG 永續指標 <span className="text-rose-500">*</span></label>
                          <select className="w-full bg-slate-950 border border-slate-700 rounded-lg p-3 text-sm text-slate-200 focus:outline-none focus:border-emerald-500 focus:ring-1 focus:ring-emerald-500 transition-all appearance-none">
                            <option value="">請選擇最符合的主標籤</option>
                            <option>SDG 3 良好健康與福祉</option>
                            <option>SDG 4 優質教育</option>
                            <option>SDG 11 永續城鄉</option>
                            <option>SDG 13 氣候行動</option>
                            <option>SDG 15 陸地生態</option>
                            <option>SDG 16 和平正義與健全制度</option>
                          </select>
                        </div>
                        <div>
                          <label className="block text-sm font-bold text-slate-200 mb-2">發現痛點 (簡述問題現況) <span className="text-rose-500">*</span></label>
                          <textarea 
                            value={painPointInput}
                            onChange={handlePainPointChange}
                            placeholder="請描述您觀察到的問題，以及受影響的對象..." 
                            className="w-full bg-slate-950 border border-slate-700 rounded-lg p-3 text-sm text-slate-200 focus:outline-none focus:border-emerald-500 focus:ring-1 focus:ring-emerald-500 h-24 resize-none transition-all placeholder:text-slate-600" 
                          />
                          {showAiSuggest && (
                            <div className="mt-3 bg-blue-900/20 border border-blue-500/40 p-4 rounded-lg flex items-start gap-3 animate-in slide-in-from-top-2">
                              <Cpu size={20} className="text-blue-400 mt-0.5 shrink-0" />
                              <p className="text-sm text-blue-200 leading-relaxed">
                                <strong className="text-blue-400">💡 AI 數據輔助 (分析 1999 資料庫)：</strong><br/>
                                過去一年該區相關陳情達 342 件，主要為樹穴隆起及綠地維護問題。建議您的解方可結合「工務局現有計畫」，將能大幅提升本提案的法規可行性！
                              </p>
                            </div>
                          )}
                        </div>
                        <div>
                          <label className="block text-sm font-bold text-slate-200 mb-2">初步解方與想像 <span className="text-rose-500">*</span></label>
                          <textarea placeholder="請說明您建議的解決方案，以及可能需要協調的市府局處或民間單位..." className="w-full bg-slate-950 border border-slate-700 rounded-lg p-3 text-sm text-slate-200 focus:outline-none focus:border-emerald-500 focus:ring-1 focus:ring-emerald-500 h-24 resize-none transition-all placeholder:text-slate-600" />
                        </div>
                      </div>
                    </div>
                  )}
                </div>

                {submitFormStatus !== 'success' && (
                  <div className="p-5 border-t border-slate-800 bg-slate-900/50 shrink-0 flex justify-end gap-3">
                    <button 
                      onClick={() => setShowSubmitModal(false)}
                      className="px-6 py-2.5 bg-slate-800 hover:bg-slate-700 text-slate-300 rounded-lg transition-colors text-sm font-bold"
                    >
                      取消
                    </button>
                    <button 
                      onClick={() => setSubmitFormStatus('success')}
                      className="px-6 py-2.5 bg-emerald-600 hover:bg-emerald-500 text-white rounded-lg transition-colors text-sm font-bold flex items-center gap-2"
                    >
                      <Send size={16} /> 送出申請
                    </button>
                  </div>
                )}
              </div>
            </div>
          )}

          {/* Footer */}
          <footer className="border-t border-slate-800 bg-slate-950 py-10 mt-auto">
            <div className="max-w-6xl mx-auto px-4 sm:px-6 lg:px-8 flex flex-col md:flex-row justify-between items-center gap-6">
              <div className="text-center md:text-left">
                <div className="flex items-center justify-center md:justify-start gap-2 mb-3">
                  <Leaf className="h-5 w-5 text-emerald-500" />
                  <span className="font-bold text-slate-300 tracking-wide">桃園市公民開源公參平台</span>
                </div>
                <p className="text-xs text-slate-500 max-w-md leading-relaxed mb-4">
                  本平台為桃園市政府第七屆青年諮詢委員會公共參與組之公民科技沙盒實驗計畫。我們致力於將提案歷程開源，推動具實質行動力的公眾參與。
                </p>
                {/* 平台技術履歷 */}
                <div className="flex flex-wrap items-center justify-center md:justify-start gap-2">
                  <span className="text-[10px] px-2 py-1 bg-slate-900 rounded border border-slate-700 text-emerald-400 flex items-center gap-1"><Github size={10}/> Powered by Open Source</span>
                  <span className="text-[10px] px-2 py-1 bg-slate-900 rounded border border-slate-700 text-blue-400 flex items-center gap-1"><Database size={10}/> 1999 API 介接準備</span>
                  <span className="text-[10px] px-2 py-1 bg-slate-900 rounded border border-slate-700 text-amber-400 flex items-center gap-1"><ExternalLink size={10}/> GitHub Pages 託管 (零伺服器成本)</span>
                </div>
              </div>
              <div className="text-xs text-slate-600 text-center md:text-right space-y-1.5 mt-6 md:mt-0">
                <p className="font-medium text-slate-500">Built with Civic Tech Spirit by TYAC 7th.</p>
                <p className="flex items-center justify-center md:justify-end gap-1 opacity-70">
                  <Github size={12} /> Hosted on GitHub Pages
                </p>
                <p className="opacity-70">※ 內容草擬與架構收斂受生成式 AI 輔助</p>
              </div>
            </div>
          </footer>
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
