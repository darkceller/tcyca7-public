                            <option value="">請選擇最符合的主標籤</option>

                            <option value="SDG 4 優質教育">SDG 4 優質教育</option>
                            <option value="SDG 11 永續城鄉">SDG 11 永續城鄉</option>
                            <option value="SDG 13 氣候行動">SDG 13 氣候行動</option>
                            <option value="SDG 15 陸地生態">SDG 15 陸地生態</option>
                            <option value="SDG 16 和平正義與健全制度">SDG 16 和平正義與健全制度</option>
                          </select>
                        </div>
                        <div>
                          <label className="block text-sm font-bold text-slate-200 mb-2">發現痛點 (簡述問題現況) <span className="text-rose-500">*</span></label>
                          <textarea 
                            value={painPointInput}
                            onChange={handlePainPointChange}
                            placeholder="請描述您觀察到的問題，以及受影響的對象..." 
                            className="w-full bg-slate-950 border border-slate-700 rounded-lg p-3 text-sm text-slate-200 focus:outline-none focus:border-emerald-500 focus:ring-1 focus:ring-emerald-500 h-24 resize-none transition-all placeholder:text-slate-600" 
                          />
                          {showAiSuggest && (
                            <div className="mt-3 bg-blue-900/20 border border-blue-500/40 p-4 rounded-lg flex items-start gap-3 animate-in slide-in-from-top-2">
                              <Cpu size={20} className="text-blue-400 mt-0.5 shrink-0" />
                              <p className="text-sm text-blue-200 leading-relaxed">
                                <strong className="text-blue-400">💡 AI 數據輔助 (分析 1999 資料庫)：</strong><br/>
                                過去一年該區相關陳情達 342 件，主要為樹穴隆起及綠地維護問題。建議您的解方可結合「工務局現有計畫」，將能大幅提升本提案的法規可行性！
                              </p>
                            </div>
                          )}
                        </div>
                        <div>
                          <label className="block text-sm font-bold text-slate-200 mb-2">初步解方與想像 <span className="text-rose-500">*</span></label>
                          <textarea 
                            value={solutionInput}
                            onChange={(e) => setSolutionInput(e.target.value)}
                            placeholder="請說明您建議的解決方案，以及可能需要協調的市府局處或民間單位..." 
                            className="w-full bg-slate-950 border border-slate-700 rounded-lg p-3 text-sm text-slate-200 focus:outline-none focus:border-emerald-500 focus:ring-1 focus:ring-emerald-500 h-24 resize-none transition-all placeholder:text-slate-600" 
                          />
                        </div>
                        <div className="pt-2 border-t border-slate-800">
                          <div className="flex items-center justify-between mb-3">
                            <label className="block text-sm font-bold text-slate-200">上傳提案草案 (PDF/Word) <span className="text-rose-500">*</span></label>
                            <a href="#" className="flex items-center gap-1 text-xs text-blue-400 hover:text-blue-300 transition-colors">
                              <Download size={14} /> 📥 下載提案草案公版範本
                            </a>
                          </div>
                          <div className="w-full bg-slate-950 border border-slate-700 border-dashed rounded-lg p-4 text-center hover:border-emerald-500 transition-all">
                            <input 
                              type="file" 
                              id="draft-upload" 
                              className="hidden" 
                              accept=".pdf,.doc,.docx"
                              onChange={handleFileUpload}
                            />
                            <label htmlFor="draft-upload" className="cursor-pointer flex flex-col items-center justify-center w-full">
                              <Upload size={32} className="text-slate-500 mb-2" />
                              <span className="text-sm text-slate-400 font-medium hover:text-emerald-400 transition-colors">
                                {draftFileName ? draftFileName : "點擊此處選擇檔案上傳"}
                              </span>
                              {!draftFileName && <span className="text-xs text-slate-600 mt-1">支援 .pdf, .docx 格式，最大 10MB</span>}
                            </label>
                          </div>
                        </div>
                      </div>
                    </div>
                  )}
                </div>

                {submitFormStatus === 'idle' && (
                  <div className="p-5 border-t border-slate-800 bg-slate-900/50 shrink-0 flex justify-end gap-3">
                    <button 
                      onClick={() => setShowSubmitModal(false)}
                      className="px-6 py-2.5 bg-slate-800 hover:bg-slate-700 text-slate-300 rounded-lg transition-colors text-sm font-bold"
                    >
                      取消
                    </button>
                    <button 
                      onClick={handleProposalSubmit}
                      disabled={!titleInput || !painPointInput || !draftFileName}
                      className="px-6 py-2.5 bg-emerald-600 hover:bg-emerald-500 disabled:bg-slate-800 disabled:text-slate-500 text-white rounded-lg transition-colors text-sm font-bold flex items-center gap-2"
                    >
                      <Send size={16} /> 送出申請
                    </button>
                  </div>
                )}
              </div>
            </div>
          )}

          {/* Footer */}
          <footer className="border-t border-slate-800 bg-slate-950 py-10 mt-auto">
            <div className="max-w-6xl mx-auto px-4 sm:px-6 lg:px-8 flex flex-col md:flex-row justify-between items-center gap-6">
              <div className="text-center md:text-left">
                <div className="flex items-center justify-center md:justify-start gap-2 mb-3">
                  <Leaf className="h-5 w-5 text-emerald-500" />
                  <span className="font-bold text-slate-300 tracking-wide">桃園青諮｜開源公參沙盒</span>
                </div>
                <p className="text-xs text-slate-500 max-w-md leading-relaxed mb-4">
                  本平台為桃園市政府第七屆青年諮詢委員會公共參與組之公民科技沙盒實驗計畫。我們致力於將提案歷程開源，推動具實質行動力的公眾參與。
                </p>
                {/* 平台技術履歷 */}
                <div className="flex flex-wrap items-center justify-center md:justify-start gap-2">
                  <span className="text-[10px] px-2 py-1 bg-slate-900 rounded border border-slate-700 text-emerald-400 flex items-center gap-1"><Github size={10}/> Powered by Open Source</span>
                  <span className="text-[10px] px-2 py-1 bg-slate-900 rounded border border-slate-700 text-blue-400 flex items-center gap-1"><Database size={10}/> 1999 API 介接準備</span>
                  <span className="text-[10px] px-2 py-1 bg-slate-900 rounded border border-slate-700 text-amber-400 flex items-center gap-1"><ExternalLink size={10}/> GitHub Pages 託管 (零伺服器成本)</span>
                </div>
              </div>
              <div className="text-xs text-slate-600 text-center md:text-right space-y-1.5 mt-6 md:mt-0">
                <p className="font-medium text-slate-500">Built with Civic Tech Spirit by TYAC 7th.</p>
                <p className="flex items-center justify-center md:justify-end gap-1 opacity-70">
                  <Github size={12} /> Hosted on GitHub Pages
                </p>
                <p className="opacity-70">※ 內容草擬與架構收斂受生成式 AI 輔助</p>
              </div>
            </div>
          </footer>
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
